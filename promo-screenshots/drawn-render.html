<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sea Battle Drawn Promo</title>
  <style>
    :root {
      --w: 1284px;
      --h: 2778px;
      --bg: #020814;
      --navy: #061322;
      --panel: rgba(5, 20, 34, 0.86);
      --panel2: rgba(8, 31, 49, 0.74);
      --line: rgba(110, 231, 255, 0.28);
      --text: #f4fbff;
      --muted: rgba(226, 244, 255, 0.72);
      --cyan: #11d9ff;
      --mint: #46ffd2;
      --violet: #9b6cff;
      --gold: #ffc857;
      --red: #ff5770;
      --accent: var(--cyan);
      --accent2: var(--mint);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: var(--w);
      height: var(--h);
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .poster {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -3%, color-mix(in srgb, var(--accent) 34%, transparent) 0, transparent 34%),
        radial-gradient(circle at 14% 38%, color-mix(in srgb, var(--accent2) 16%, transparent) 0, transparent 28%),
        radial-gradient(circle at 96% 72%, color-mix(in srgb, var(--accent) 19%, transparent) 0, transparent 29%),
        linear-gradient(160deg, #04162a 0%, #020814 48%, #06101f 100%);
    }

    .poster::before,
    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .poster::before {
      opacity: 0.24;
      background-image:
        linear-gradient(to right, color-mix(in srgb, var(--accent) 24%, transparent) 1px, transparent 1px),
        linear-gradient(to bottom, color-mix(in srgb, var(--accent) 24%, transparent) 1px, transparent 1px);
      background-size: 84px 84px;
      mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.8) 54%, transparent 96%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.8) 54%, transparent 96%);
    }

    .poster::after {
      background:
        linear-gradient(180deg, rgba(2, 8, 20, 0.16) 0%, transparent 26%, rgba(2, 8, 20, 0.55) 100%),
        radial-gradient(circle at 50% 50%, transparent 0, transparent 58%, rgba(0, 0, 0, 0.34) 100%);
    }

    .waves {
      position: absolute;
      left: -120px;
      right: -120px;
      bottom: -80px;
      height: 880px;
      opacity: 0.38;
      background:
        repeating-radial-gradient(ellipse at 50% 140%, transparent 0 62px, color-mix(in srgb, var(--accent) 24%, transparent) 64px 66px, transparent 68px 126px);
      transform: rotate(-2deg);
      pointer-events: none;
    }

    .copy {
      position: absolute;
      z-index: 3;
      top: 104px;
      left: 72px;
      right: 72px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      border: 2px solid color-mix(in srgb, var(--accent) 44%, transparent);
      border-radius: 16px;
      color: var(--accent);
      background: rgba(2, 8, 20, 0.5);
      box-shadow: 0 0 34px color-mix(in srgb, var(--accent) 20%, transparent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 23px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin: 40px auto 0;
      max-width: 1080px;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 104px;
      line-height: 0.94;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-shadow:
        0 0 28px color-mix(in srgb, var(--accent) 52%, transparent),
        0 14px 44px rgba(0, 0, 0, 0.64);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      width: min(970px, 100%);
      margin: 34px auto 0;
      color: var(--muted);
      font-size: 39px;
      font-weight: 800;
      line-height: 1.24;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.6);
    }

    .deviceWrap {
      position: absolute;
      z-index: 2;
      left: 154px;
      top: 716px;
      width: 976px;
      height: 1504px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 54px 88px rgba(0, 0, 0, 0.58));
    }

    .phone {
      width: 820px;
      height: 1480px;
      border-radius: 66px;
      padding: 24px;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--accent) 54%, #10233a) 0%, #07111f 46%, #102239 100%);
      box-shadow:
        inset 0 0 0 2px color-mix(in srgb, var(--accent) 50%, transparent),
        0 0 0 10px rgba(2, 8, 20, 0.78),
        0 0 88px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 2px solid color-mix(in srgb, var(--accent) 38%, transparent);
      border-radius: 46px;
      background:
        radial-gradient(circle at 50% 8%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 34%),
        linear-gradient(180deg, rgba(6, 26, 44, 0.98), rgba(2, 8, 20, 0.98));
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.22;
      background-image:
        linear-gradient(to right, color-mix(in srgb, var(--accent) 22%, transparent) 1px, transparent 1px),
        linear-gradient(to bottom, color-mix(in srgb, var(--accent) 22%, transparent) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .notch {
      position: absolute;
      z-index: 3;
      top: 18px;
      left: 50%;
      width: 214px;
      height: 44px;
      transform: translateX(-50%);
      border-radius: 0 0 28px 28px;
      background: #030915;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.36);
    }

    .app {
      position: absolute;
      z-index: 2;
      inset: 76px 34px 34px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 76px;
      padding: 0 6px;
    }

    .brandMark {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 27px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .logo {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #02101a;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 54%, transparent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 27px;
      letter-spacing: -0.08em;
    }

    .wallet {
      min-height: 50px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
      border-radius: 14px;
      color: var(--accent2);
      background: rgba(2, 8, 20, 0.46);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 18px;
      letter-spacing: 0.08em;
    }

    .statusRow {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat {
      min-height: 94px;
      padding: 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 18px;
      background: rgba(2, 8, 20, 0.48);
    }

    .stat small {
      display: block;
      color: rgba(230, 247, 255, 0.55);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .stat b {
      display: block;
      margin-top: 9px;
      color: #fff;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 30px;
      letter-spacing: 0.04em;
    }

    .heroPanel,
    .glassPanel {
      position: relative;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
      border-radius: 26px;
      background:
        radial-gradient(circle at 24% 0%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 34%),
        linear-gradient(180deg, rgba(8, 28, 48, 0.84), rgba(4, 13, 25, 0.8));
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.025),
        0 0 34px color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .heroPanel {
      min-height: 370px;
      padding: 28px;
    }

    .panelTitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--accent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .panelTitle .pill {
      min-height: 34px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
      border-radius: 999px;
      color: #07111f;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 13px;
      letter-spacing: 0.12em;
    }

    .radar {
      position: absolute;
      top: 78px;
      right: 38px;
      width: 232px;
      height: 232px;
      border-radius: 50%;
      background:
        radial-gradient(circle, color-mix(in srgb, var(--accent) 48%, transparent) 0 8%, transparent 9% 23%, color-mix(in srgb, var(--accent) 26%, transparent) 24% 25%, transparent 26% 48%, color-mix(in srgb, var(--accent) 22%, transparent) 49% 50%, transparent 51%),
        conic-gradient(from -20deg, color-mix(in srgb, var(--accent) 50%, transparent), transparent 30%, transparent);
      box-shadow: 0 0 46px color-mix(in srgb, var(--accent) 26%, transparent);
    }

    .radar::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 10px;
      height: 10px;
      margin: -5px;
      border-radius: 50%;
      background: #fff;
      box-shadow:
        66px -34px 0 -2px var(--accent),
        -50px 52px 0 -1px var(--accent2),
        22px 72px 0 -3px #fff;
    }

    .shipSilhouette {
      position: absolute;
      left: 34px;
      bottom: 36px;
      width: 440px;
      height: 138px;
      filter: drop-shadow(0 22px 28px rgba(0, 0, 0, 0.44));
    }

    .shipBody {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 62px;
      border-radius: 16px 28px 54px 54px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 54%, #10243a), #0b1929);
      clip-path: polygon(0 12%, 78% 12%, 100% 42%, 87% 100%, 12% 100%);
      border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .shipTower {
      position: absolute;
      left: 160px;
      bottom: 52px;
      width: 124px;
      height: 92px;
      border-radius: 12px 12px 0 0;
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 48%, #10243a), #0a1625);
      clip-path: polygon(28% 0, 74% 0, 88% 100%, 12% 100%);
    }

    .shipGun {
      position: absolute;
      left: 252px;
      bottom: 92px;
      width: 154px;
      height: 14px;
      border-radius: 999px;
      background: var(--accent);
      transform: rotate(-12deg);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 58%, transparent);
    }

    .modeGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .modeCard {
      min-height: 154px;
      padding: 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      border-radius: 22px;
      background: rgba(2, 8, 20, 0.5);
    }

    .modeCard b {
      display: block;
      color: #fff;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .modeCard span {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.24;
    }

    .cta {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 20px;
      color: #04111d;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 34%, transparent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 24px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .battleGridWrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .battlePanel {
      min-height: 684px;
      padding: 24px;
    }

    .battlePanel .board {
      width: max-content;
      margin: 16px auto 0;
      grid-template-columns: repeat(10, 52px);
    }

    .battlePanel .cell {
      width: 52px;
      height: 52px;
      aspect-ratio: auto;
    }

    .fireControl {
      min-height: 196px;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .fireCard {
      display: grid;
      align-content: center;
      justify-items: center;
      border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
      border-radius: 18px;
      background: rgba(2, 8, 20, 0.42);
      text-align: center;
    }

    .fireCard b {
      color: #fff;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 34px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .fireCard span {
      margin-top: 10px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .boardHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--accent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent);
      border-radius: 18px;
      background: rgba(2, 8, 20, 0.52);
    }

    .cell {
      aspect-ratio: 1;
      border: 1px solid color-mix(in srgb, var(--accent) 24%, transparent);
      border-radius: 7px;
      background: rgba(15, 42, 64, 0.72);
    }

    .cell.ship {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 58%, #12263b), #102235);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 46%, transparent);
    }

    .cell.hit {
      background:
        radial-gradient(circle, #fff 0 13%, var(--red) 14% 28%, transparent 29%),
        rgba(47, 18, 34, 0.84);
      border-color: rgba(255, 87, 112, 0.54);
      box-shadow: 0 0 18px rgba(255, 87, 112, 0.45);
    }

    .cell.miss {
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 9%, transparent 10%),
        rgba(16, 42, 64, 0.68);
    }

    .battleStats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .miniStat {
      min-height: 86px;
      padding: 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
      border-radius: 16px;
      background: rgba(2, 8, 20, 0.46);
      text-align: center;
    }

    .miniStat b {
      display: block;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 28px;
      color: #fff;
    }

    .miniStat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .wagerPanel {
      padding: 28px;
      min-height: 836px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .coin {
      width: 250px;
      height: 250px;
      margin: 18px auto 2px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #02101a;
      background:
        radial-gradient(circle at 34% 28%, #fff 0 8%, transparent 9%),
        linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:
        inset 0 -18px 30px rgba(0, 0, 0, 0.18),
        0 0 70px color-mix(in srgb, var(--accent) 42%, transparent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 46px;
      letter-spacing: -0.04em;
    }

    .prize {
      text-align: center;
    }

    .prize small {
      color: var(--accent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .prize b {
      display: block;
      margin-top: 12px;
      color: #fff;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 74px;
      letter-spacing: 0.04em;
    }

    .stakes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stake {
      min-height: 98px;
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--accent) 36%, transparent);
      border-radius: 18px;
      color: #fff;
      background: rgba(2, 8, 20, 0.52);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 28px;
      letter-spacing: 0.06em;
    }

    .stake.active {
      color: #06101b;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .ruleList {
      display: grid;
      gap: 12px;
    }

    .rule {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
      border-radius: 14px;
      color: rgba(235, 248, 255, 0.82);
      background: rgba(2, 8, 20, 0.38);
      font-size: 20px;
      font-weight: 800;
    }

    .rule b {
      color: var(--accent2);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 0.08em;
    }

    .friendPanel {
      padding: 26px;
      min-height: 842px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .roomCode {
      min-height: 150px;
      display: grid;
      place-items: center;
      border: 1px dashed color-mix(in srgb, var(--accent) 54%, transparent);
      border-radius: 24px;
      background: rgba(2, 8, 20, 0.45);
      color: #fff;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 52px;
      letter-spacing: 0.18em;
      text-shadow: 0 0 28px color-mix(in srgb, var(--accent) 48%, transparent);
    }

    .friendMap {
      position: relative;
      min-height: 372px;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 24px;
      background:
        radial-gradient(circle at 24% 38%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 16%),
        radial-gradient(circle at 76% 58%, color-mix(in srgb, var(--accent2) 22%, transparent), transparent 18%),
        rgba(2, 8, 20, 0.44);
      overflow: hidden;
    }

    .friendMap::before {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      top: 48%;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 0 24px color-mix(in srgb, var(--accent) 48%, transparent);
      transform: rotate(6deg);
    }

    .avatar {
      position: absolute;
      width: 118px;
      height: 118px;
      display: grid;
      place-items: center;
      border: 3px solid color-mix(in srgb, var(--accent) 66%, transparent);
      border-radius: 30px;
      color: #06101b;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 42px;
      box-shadow: 0 0 36px color-mix(in srgb, var(--accent) 36%, transparent);
    }

    .avatar.a {
      left: 88px;
      top: 92px;
    }

    .avatar.b {
      right: 88px;
      top: 154px;
      background: linear-gradient(135deg, var(--accent2), #fff);
    }

    .inviteSteps {
      display: grid;
      gap: 12px;
    }

    .step {
      min-height: 66px;
      display: grid;
      grid-template-columns: 48px 1fr;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
      border-radius: 16px;
      background: rgba(2, 8, 20, 0.42);
      color: rgba(236, 248, 255, 0.82);
      font-size: 21px;
      font-weight: 850;
    }

    .step b {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #06101b;
      background: var(--accent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 18px;
    }

    .leaderPanel {
      padding: 26px;
      min-height: 842px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .leaderHero {
      min-height: 224px;
      padding: 24px;
      border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
      border-radius: 24px;
      background:
        radial-gradient(circle at 80% 14%, color-mix(in srgb, var(--accent) 34%, transparent), transparent 28%),
        rgba(2, 8, 20, 0.48);
    }

    .rank {
      color: var(--accent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .score {
      margin-top: 18px;
      color: #fff;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 82px;
      letter-spacing: 0.02em;
    }

    .progress {
      height: 20px;
      margin-top: 24px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, transparent);
      border-radius: 999px;
      background: rgba(2, 8, 20, 0.58);
    }

    .progress i {
      display: block;
      width: 73%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 48%, transparent);
    }

    .leaderRows {
      display: grid;
      gap: 12px;
    }

    .leaderRow {
      min-height: 82px;
      display: grid;
      grid-template-columns: 64px 1fr 116px;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 24%, transparent);
      border-radius: 18px;
      background: rgba(2, 8, 20, 0.44);
    }

    .place {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: #06101b;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 18px;
    }

    .captain b {
      display: block;
      color: #fff;
      font-size: 23px;
      font-weight: 900;
    }

    .captain small {
      display: block;
      margin-top: 5px;
      color: rgba(230, 247, 255, 0.58);
      font-size: 17px;
      font-weight: 800;
    }

    .pts {
      color: var(--accent);
      text-align: right;
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
    }

    .tabs {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      min-height: 70px;
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
      border-radius: 22px;
      background: rgba(2, 8, 20, 0.52);
    }

    .tab {
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: rgba(234, 248, 255, 0.58);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tab.active {
      color: #06101b;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 34%, transparent);
    }

    .badgeRow {
      position: absolute;
      z-index: 4;
      left: 72px;
      right: 72px;
      bottom: 128px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .badge {
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid color-mix(in srgb, var(--accent) 38%, transparent);
      border-radius: 18px;
      color: rgba(245, 251, 255, 0.9);
      background: rgba(2, 8, 20, 0.7);
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 18%, transparent);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 23px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand {
      position: absolute;
      z-index: 4;
      left: 72px;
      right: 72px;
      bottom: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: rgba(235, 248, 255, 0.72);
      font-family: "Arial Black", Impact, Arial, sans-serif;
      font-size: 24px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brandIcon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      color: #06101b;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 18px;
      letter-spacing: 0;
      box-shadow: 0 0 24px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .variant-wager {
      --accent: var(--violet);
      --accent2: var(--gold);
    }

    .variant-friends {
      --accent: var(--mint);
      --accent2: var(--cyan);
    }

    .variant-rank {
      --accent: var(--gold);
      --accent2: var(--red);
    }

    .variant-battle h1 {
      font-size: 96px;
    }
  </style>
</head>
<body>
  <section class="poster">
    <div class="waves"></div>
    <main class="copy">
      <div class="eyebrow">Sea Battle on Base</div>
      <h1></h1>
      <p class="subtitle"></p>
    </main>
    <section class="deviceWrap"></section>
    <section class="badgeRow"></section>
    <footer class="brand"><span class="brandIcon">SB</span> Sea Battle</footer>
  </section>

  <script>
    const slides = {
      "1": {
        variant: "home",
        title: "Command<br><span>Your Fleet</span>",
        subtitle: "A clean mobile command deck for fast naval battles, rewards, and ranked progress.",
        badges: ["Mobile", "Onchain", "PvP"],
        active: "Miniapp"
      },
      "2": {
        variant: "battle",
        title: "Place Ships.<br><span>Strike First.</span>",
        subtitle: "Plan your grid, read the radar, and sink every target before your rival does.",
        badges: ["Strategy", "AI Bot", "Rewards"],
        active: "Fleet"
      },
      "3": {
        variant: "wager",
        title: "Wager<br><span>On Base</span>",
        subtitle: "Choose a USDC stake, lock the room, and battle for the prize pool.",
        badges: ["USDC", "Base", "Prize Pool"],
        active: "Wager"
      },
      "4": {
        variant: "friends",
        title: "Play<br><span>With Friends</span>",
        subtitle: "Create a private room, send the link, and start a battle from anywhere.",
        badges: ["Room Link", "Private", "Instant"],
        active: "Friends"
      },
      "5": {
        variant: "rank",
        title: "Climb<br><span>The Ranks</span>",
        subtitle: "Earn points, hold streaks, and chase the top captains on the leaderboard.",
        badges: ["Points", "Streaks", "Ranks"],
        active: "Profile"
      }
    };

    const params = new URLSearchParams(location.search);
    const data = slides[params.get("slide") || "1"] || slides["1"];
    const poster = document.querySelector(".poster");
    poster.classList.add(`variant-${data.variant}`);
    document.querySelector("h1").innerHTML = data.title;
    document.querySelector(".subtitle").textContent = data.subtitle;
    document.querySelector(".badgeRow").innerHTML = data.badges.map((badge) => `<div class="badge">${badge}</div>`).join("");

    const navTabs = data.variant === "friends" ? ["Miniapp", "Friend", "Profile", "Fleet"] : ["Miniapp", "Wager", "Profile", "Fleet"];
    const tabs = navTabs.map((tab) => {
      const active = tab === data.active || (data.active === "Friends" && tab === "Friend");
      return `<div class="tab ${active ? "active" : ""}">${tab}</div>`;
    }).join("");

    function board(classes) {
      const marked = new Map(classes.map((item) => [item[0], item[1]]));
      let cells = "";
      for (let i = 0; i < 100; i += 1) {
        cells += `<div class="cell ${marked.get(i) || ""}"></div>`;
      }
      return `<div class="board">${cells}</div>`;
    }

    function shell(content) {
      return `
        <div class="phone">
          <div class="screen">
            <div class="notch"></div>
            <div class="app">
              <div class="topbar">
                <div class="brandMark"><span class="logo">SB</span><span>Sea Battle</span></div>
                <div class="wallet">0x7A...F10B</div>
              </div>
              ${content}
              <div class="tabs">${tabs}</div>
            </div>
          </div>
        </div>
      `;
    }

    function home() {
      return shell(`
        <div class="statusRow">
          <div class="stat"><small>Wins</small><b>24</b></div>
          <div class="stat"><small>Fleet</small><b>5/5</b></div>
          <div class="stat"><small>Rank</small><b>#18</b></div>
        </div>
        <section class="heroPanel">
          <div class="panelTitle">Battle Station <span class="pill">Ready</span></div>
          <div class="radar"></div>
          <div class="shipSilhouette">
            <div class="shipGun"></div>
            <div class="shipTower"></div>
            <div class="shipBody"></div>
          </div>
        </section>
        <section class="modeGrid">
          <div class="modeCard"><b>Bot Game</b><span>Practice shots and placement.</span></div>
          <div class="modeCard"><b>Friend</b><span>Create a private battle room.</span></div>
          <div class="modeCard"><b>Wager</b><span>Play for a USDC prize pool.</span></div>
          <div class="modeCard"><b>Leaderboard</b><span>Track points and streaks.</span></div>
        </section>
        <div class="cta">Launch Battle</div>
      `);
    }

    function battle() {
      const ships = [[2, "ship"], [3, "ship"], [4, "ship"], [15, "ship"], [25, "ship"], [35, "ship"], [48, "ship"], [49, "ship"], [50, "ship"], [51, "ship"], [72, "ship"], [82, "ship"], [92, "ship"]];
      const shots = [[6, "miss"], [18, "hit"], [27, "miss"], [39, "hit"], [63, "miss"], [76, "hit"], [88, "miss"]];
      return shell(`
        <section class="glassPanel battlePanel">
          <div class="panelTitle">Deploy Fleet <span class="pill">Turn 04</span></div>
          <div style="margin-top: 24px;">
            <div class="boardHeader"><span>Your Waters</span><span>5 Ships</span></div>
            ${board(ships)}
          </div>
        </section>
        <section class="glassPanel fireControl">
          <div class="fireCard"><b>B7</b><span>Next Shot</span></div>
          <div class="fireCard"><b>Lock</b><span>Radar Scan</span></div>
        </section>
        <div class="battleStats">
          <div class="miniStat"><b>7</b><span>Shots</span></div>
          <div class="miniStat"><b>3</b><span>Hits</span></div>
          <div class="miniStat"><b>42s</b><span>Timer</span></div>
        </div>
      `);
    }

    function wager() {
      return shell(`
        <section class="glassPanel wagerPanel">
          <div class="panelTitle">Wager Room <span class="pill">Base</span></div>
          <div class="coin">USDC</div>
          <div class="prize"><small>Prize Pool</small><b>18 USDC</b></div>
          <div class="stakes">
            <div class="stake">1</div>
            <div class="stake active">5</div>
            <div class="stake">10</div>
          </div>
          <div class="ruleList">
            <div class="rule"><span>Winner share</span><b>90%</b></div>
            <div class="rule"><span>Network</span><b>Base</b></div>
            <div class="rule"><span>Match type</span><b>PvP</b></div>
          </div>
          <div class="cta">Create Room</div>
        </section>
      `);
    }

    function friends() {
      return shell(`
        <section class="glassPanel friendPanel">
          <div class="panelTitle">Private Battle <span class="pill">Live</span></div>
          <div class="roomCode">ROOM 7429</div>
          <div class="friendMap">
            <div class="avatar a">YOU</div>
            <div class="avatar b">P2</div>
          </div>
          <div class="inviteSteps">
            <div class="step"><b>1</b><span>Create a room for your fleet.</span></div>
            <div class="step"><b>2</b><span>Send the invite link to a friend.</span></div>
            <div class="step"><b>3</b><span>Start when both captains are ready.</span></div>
          </div>
          <div class="cta">Copy Invite Link</div>
        </section>
      `);
    }

    function rank() {
      return shell(`
        <section class="glassPanel leaderPanel">
          <div class="leaderHero">
            <div class="rank">Captain Rank</div>
            <div class="score">#18</div>
            <div class="progress"><i></i></div>
          </div>
          <div class="leaderRows">
            ${[
              ["#1", "Admiral Ray", "12 win streak", "842"],
              ["#2", "Base Captain", "9 win streak", "731"],
              ["#3", "Chain Fleet", "7 win streak", "690"],
              ["#18", "You", "4 win streak", "428"],
              ["#19", "Wave Rider", "3 win streak", "411"]
            ].map((row) => `
              <div class="leaderRow">
                <div class="place">${row[0]}</div>
                <div class="captain"><b>${row[1]}</b><small>${row[2]}</small></div>
                <div class="pts">${row[3]}</div>
              </div>
            `).join("")}
          </div>
          <div class="cta">Claim Points</div>
        </section>
      `);
    }

    const views = { home, battle, wager, friends, rank };
    document.querySelector(".deviceWrap").innerHTML = views[data.variant]();
  </script>
</body>
</html>
